name: pfmt_app
description: "Pelvic Floor Muscle Training (PFMT) App with voice tracking"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.0.5

  # Speech recognition
  speech_to_text: ^7.0.0

  # Firebase
  firebase_core: ^2.15.0
  cloud_firestore: ^4.9.0

  # Local storage
  shared_preferences: ^2.2.2

  # Audio feedback
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/